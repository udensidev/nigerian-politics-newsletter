name: Daily Newsletter

on:
  schedule:
    # GitHub cron is UTC. These two entries cover 7:00 AM Central across
    # daylight saving time, and the guard step below skips the non-matching run.
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  send:
    name: Build and send newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      USE_AI_FILTER: ${{ vars.USE_AI_FILTER }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check Central time guard
        id: central_time
        shell: bash
        run: |
          central_offset="$(TZ=America/Chicago date +%z)"
          scheduled_cron="${{ github.event.schedule }}"

          case "${central_offset}" in
            -0500) expected_cron="0 12 * * *" ;;
            -0600) expected_cron="0 13 * * *" ;;
            *)
              echo "::error::Unexpected America/Chicago UTC offset: ${central_offset}"
              exit 1
              ;;
          esac

          echo "central_offset=${central_offset}" >> "$GITHUB_OUTPUT"
          echo "expected_cron=${expected_cron}" >> "$GITHUB_OUTPUT"
          echo "scheduled_cron=${scheduled_cron}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${scheduled_cron}" == "${expected_cron}" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run because ${scheduled_cron} fired, but America/Chicago offset ${central_offset} expects ${expected_cron} for 7:00 AM Central."
          fi

      - name: Validate production secrets
        if: steps.central_time.outputs.should_run == 'true'
        shell: bash
        env:
          REQUIRED_SMTP_HOST: ${{ secrets.SMTP_HOST }}
          REQUIRED_SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REQUIRED_NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          REQUIRED_SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          REQUIRED_SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

          missing=()
          [[ -n "$REQUIRED_SMTP_HOST" ]] || missing+=("SMTP_HOST")
          [[ -n "$REQUIRED_SMTP_FROM" ]] || missing+=("SMTP_FROM")
          [[ -n "$REQUIRED_NEWSLETTER_RECIPIENTS" ]] || missing+=("NEWSLETTER_RECIPIENTS")
          [[ -n "$REQUIRED_SMTP_USERNAME" ]] || missing+=("SMTP_USERNAME")
          [[ -n "$REQUIRED_SMTP_PASSWORD" ]] || missing+=("SMTP_PASSWORD")

          if (( ${#missing[@]} > 0 )); then
            joined="$(printf ", %s" "${missing[@]}")"
            joined="${joined:2}"
            echo "::error::Missing required GitHub Actions secrets: ${joined}"
            exit 1
          fi

      - name: Check out repository
        if: steps.central_time.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.central_time.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        if: steps.central_time.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        if: steps.central_time.outputs.should_run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        if: steps.central_time.outputs.should_run == 'true'
        run: npm ci

      - name: Run tests
        if: steps.central_time.outputs.should_run == 'true'
        run: pytest

      - name: Send production newsletter
        if: steps.central_time.outputs.should_run == 'true'
        run: python main.py --send-production --confirm-production

      - name: Upload generated artifacts
        if: steps.central_time.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: newsletter-${{ github.run_id }}
          path: |
            logs/
            data/raw/
            data/processed/
            data/formatted/
          if-no-files-found: ignore
